    function buildTabs() {
      const btnContainer = document.getElementById('tab-buttons');
      const contentContainer = document.getElementById('tab-content');
      let first = true;

      for (const [key, section] of Object.entries(db)) {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${first ? 'active' : ''}`;
        btn.innerText = section.title;
        btn.onclick = (e) => switchTab(key, e.currentTarget);
        btnContainer.appendChild(btn);

        const pane = document.createElement('div');
        pane.id = `tab-${key}`;
        pane.className = `tab-pane ${first ? 'active' : ''}`;
        
        let tableHTML = `<div class="table-wrapper"><table class="tier-table" id="table-${key}"><thead><tr>`;
        section.cols.forEach((col, index) => {
          tableHTML += `<th onclick="sortTable(${index}, 'table-${key}')">${col}</th>`;
        });
        tableHTML += `</tr></thead><tbody>`;
        
        section.data.forEach(row => {
          tableHTML += `<tr>`;
          row.forEach(cell => { tableHTML += `<td>${cell}</td>`; });
          tableHTML += `</tr>`;
        });
        
        tableHTML += `</tbody></table></div>`;
        pane.innerHTML = tableHTML;
        contentContainer.appendChild(pane);
        first = false;
      }
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      btn.classList.add('active');
    }

    function sortTable(n, tableId) {
      const table = document.getElementById(tableId);
      let rows, switching = true, dir = "asc", switchcount = 0;
      while (switching) {
        switching = false;
        rows = table.rows;
        for (let i = 1; i < (rows.length - 1); i++) {
          let shouldSwitch = false;
          let x = rows[i].getElementsByTagName("TD")[n];
          let y = rows[i + 1].getElementsByTagName("TD")[n];
          let xVal = isNaN(x.innerHTML) ? x.innerHTML.toLowerCase() : parseFloat(x.innerHTML);
          let yVal = isNaN(y.innerHTML) ? y.innerHTML.toLowerCase() : parseFloat(y.innerHTML);
          if (dir == "asc" ? xVal > yVal : xVal < yVal) {
            rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
            switching = true;
            switchcount++;
            break;
          }
        }
        if (switchcount == 0 && dir == "asc") { dir = "desc"; switching = true; }
      }
    }

    window.onload = buildTabs;
  </script>
