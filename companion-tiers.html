<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Companion Database | Bill Wavey Tools</title>
  <style>
    :root { --bg-main: #0a0a0c; --bg-card: #15151a; --border-color: #2a2a35; --brand-purple: #3D1F5B; --brand-accent: #9d5bdf; --text-primary: #ffffff; --text-secondary: #a0a0ab; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-main); color: var(--text-primary); }
    
    /* Layout */
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    /* Tab System */
    .tab-container { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
    .tab-btn { background-color: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background-color: var(--brand-purple); color: white; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Table & Sorting */
    .table-wrapper { overflow-x: auto; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color); }
    .tier-table { width: 100%; border-collapse: collapse; }
    .tier-table th { background: #1c1c22; padding: 15px; text-align: left; cursor: pointer; color: var(--brand-accent); border-bottom: 2px solid var(--border-color); user-select: none; }
    .tier-table th:hover { background: #2a2a35; }
    .tier-table td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
    .tier-table tr:hover { background: var(--bg-card-hover); }
  </style>
</head>
<body>

  <main class="container">
    <div class="tab-container">
      <button class="tab-btn active" onclick="openTab('gov')">Governors</button>
      <button class="tab-btn" onclick="openTab('party')">Party Leaders</button>
      <!-- Add other buttons here -->
    </div>

    <div id="gov" class="tab-pane active">
      <div class="table-wrapper">
        <table class="tier-table" id="govTable">
          <thead>
            <tr>
              <th onclick="sortTable(0, 'govTable')">Rank ↕</th>
              <th onclick="sortTable(1, 'govTable')">Companion ↕</th>
              <th onclick="sortTable(2, 'govTable')">Culture ↕</th>
              <th onclick="sortTable(3, 'govTable')">Eng ↕</th>
              <th onclick="sortTable(4, 'govTable')">Steward ↕</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>1</td><td>The Scholar</td><td>Empire</td><td>136</td><td>127</td></tr>
            <tr><td>2</td><td>The Knowing</td><td>Khuzait</td><td>81</td><td>113</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    function openTab(id) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function sortTable(n, tableId) {
      var table = document.getElementById(tableId);
      var rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
      switching = true;
      dir = "asc"; 
      while (switching) {
        switching = false;
        rows = table.rows;
        for (i = 1; i < (rows.length - 1); i++) {
          shouldSwitch = false;
          x = rows[i].getElementsByTagName("TD")[n];
          y = rows[i + 1].getElementsByTagName("TD")[n];
          var xVal = isNaN(x.innerHTML) ? x.innerHTML.toLowerCase() : parseFloat(x.innerHTML);
          var yVal = isNaN(y.innerHTML) ? y.innerHTML.toLowerCase() : parseFloat(y.innerHTML);
          if (dir == "asc") { if (xVal > yVal) { shouldSwitch = true; break; } } 
          else if (dir == "desc") { if (xVal < yVal) { shouldSwitch = true; break; } }
        }
        if (shouldSwitch) { rows[i].parentNode.insertBefore(rows[i + 1], rows[i]); switching = true; switchcount ++; } 
        else { if (switchcount == 0 && dir == "asc") { dir = "desc"; switching = true; } }
      }
    }
  </script>
</body>
</html>
